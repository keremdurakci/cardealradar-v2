name: Bayi kampanya verisini otomatik guncelle

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Repo yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gereksinimleri kur
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Scraper i calistir
        run: python dealer_scraper.py

      - name: Degisiklikleri commit le
        run: |
          git config --global user.name "cardealradar-bot"
          git config --global user.email "bot@cardealradar.ca"
          git add offers.json scrape_log.txt
          git diff --staged --quiet || git commit -m "Otomatik guncelleme"
          git push
